<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — averyio.net</title>
  <meta name="description" content="Get in touch with AveryIO." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23C4152B'/%3E%3Ctext x='16' y='23' font-family='Arial,sans-serif' font-size='21' font-weight='700' text-anchor='middle' fill='white'%3Ea%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #C4152B;
      --red-light:  rgba(196,21,43,0.07);
      --red-border: rgba(196,21,43,0.20);
      --bg:         #F7F7F5;
      --surface:    #FFFFFF;
      --border:     #E5E4E2;
      --text:       #111111;
      --muted:      #6B7280;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 75% 50% at 50% -8%, rgba(196,21,43,0.055) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      padding: 0 clamp(20px, 5%, 64px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(247,247,245,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }
    .nav-logo span { color: var(--red); }

    .nav-links {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--text); background: rgba(0,0,0,0.04); }

    /* ── Page header ── */
    .page-header {
      position: relative;
      z-index: 1;
      padding: clamp(64px, 12vw, 120px) clamp(20px, 5%, 64px) clamp(40px, 7vw, 64px);
      max-width: 800px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--red);
      margin-bottom: 1.4rem;
    }
    .page-eyebrow::before {
      content: '';
      display: block;
      width: 18px;
      height: 1.5px;
      background: var(--red);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 1rem;
      line-height: 1.05;
    }

    .page-sub {
      font-size: clamp(0.95rem, 2.2vw, 1.05rem);
      color: var(--muted);
      font-weight: 400;
      line-height: 1.65;
      max-width: 400px;
    }

    /* ── Contact card ── */
    .contact-wrapper {
      position: relative;
      z-index: 1;
      padding: 0 clamp(20px, 5%, 64px) clamp(64px, 12vw, 112px);
      opacity: 0;
      animation: fadeUp 0.55s ease forwards 0.25s;
    }

    .x-card {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 1.1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .x-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.09), 0 20px 40px rgba(196,21,43,0.08);
      border-color: var(--red-border);
    }

    .x-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      fill: var(--text);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: 1.5rem clamp(20px, 5%, 64px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
      padding: 4px 8px;
      border-radius: 6px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
    }
    footer a:hover { color: var(--text); }

    .footer-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .nav-links a { padding: 8px 8px; font-size: 0.82rem; }
      footer { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">averyio<span>.net</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </nav>

  <div class="page-header">
    <span class="page-eyebrow">Get in touch</span>
    <h1>Contact</h1>
    <p class="page-sub">Have a question or want to work together? Message me on X.</p>
  </div>

  <div class="contact-wrapper">
    <a href="https://x.com/averyio18" target="_blank" rel="noopener" class="x-card">
      <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      @averyio18
    </a>
  </div>

  <footer>
    <span>&copy; 2026 AveryIO</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </footer>

</body>
</html>
