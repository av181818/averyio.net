<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy — AveryIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0003;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      padding: 0 5%;
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 4px;
    }
    nav a:hover { color: #fff; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 5%;
      text-align: center;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: -0.5px;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .app-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      min-height: 56px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .app-link:hover, .app-link:active {
      background: rgba(224,28,46,0.15);
      border-color: rgba(224,28,46,0.5);
    }

    .app-link .arrow {
      color: rgba(255,255,255,0.35);
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .app-link:hover .arrow { transform: translateX(3px); color: #e01c2e; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">&larr; averyio.net</a>
  </nav>

  <main>
    <h1>App Privacy Policies</h1>
    <div class="app-list">
      <a href="privacy-surge.html" class="app-link">
        <span>Surge</span>
        <span class="arrow">&#8594;</span>
      </a>
    </div>
  </main>

</body>
</html>
